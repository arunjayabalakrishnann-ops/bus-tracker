<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚌 Driver Panel</title>
 
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
 
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0F1923;
      color: #B0BEC5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 400px; }
    h1 { color: #FF5722; font-size: 1.4rem; margin-bottom: 6px; }
    .subtitle { color: #546E7A; font-size: 0.82rem; margin-bottom: 24px; }
    .group { margin-bottom: 16px; }
    label { display:block; font-size:0.72rem; font-weight:700; color:#78909C;
            text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    select {
      width:100%; padding:12px 14px; background:#1A2740; color:white;
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      font-size:0.9rem; cursor:pointer; font-family:inherit;
    }
    button {
      width:100%; padding:14px; background:linear-gradient(135deg,#FF5722,#FF8F00);
      color:white; border:none; border-radius:12px; font-size:1rem;
      font-weight:700; cursor:pointer; margin-bottom:10px; font-family:inherit;
      transition: transform 0.2s;
    }
    button:hover { transform:translateY(-2px); }
    #btn-stop { background:rgba(255,255,255,0.06); color:#90A4AE;
               border:1px solid rgba(255,255,255,0.1); }
    #status-box {
      background: #1A2740; border-radius:12px; padding:16px;
      margin-top:16px; font-size:0.82rem; line-height:2;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .status-row { display:flex; justify-content:space-between; }
    .status-label { color:#546E7A; }
    .status-val { color:white; font-weight:600; }
    .active-badge {
      display:inline-block; background:rgba(0,191,165,0.15);
      color:#00BFA5; border:1px solid rgba(0,191,165,0.3);
      padding:2px 10px; border-radius:20px; font-size:0.72rem;
      font-weight:700; animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚌 Driver Panel</h1>
    <p class="subtitle">Your GPS location is sent to Firebase every 5 seconds when tracking is active.</p>
 
    <div class="group">
      <label>Select Your Bus</label>
      <select id="sel-bus">
        <option value="BUS_KA01">Bus KA01 — Route 1</option>
        <option value="BUS_KA02">Bus KA02 — Route 2</option>
        <option value="BUS_KA03">Bus KA03 — Route 1</option>
      </select>
    </div>
 
    <div class="group">
      <label>Select Your Route</label>
      <select id="sel-route">
        <option value="ROUTE_1">Route 1 — Central to Airport</option>
        <option value="ROUTE_2">Route 2 — Hospital to Market</option>
      </select>
    </div>
 
    <div class="group">
      <label>Current Crowd Level</label>
      <select id="sel-crowd">
        <option value="Low">🟢 Low — Plenty of seats available</option>
        <option value="Medium">🟡 Medium — Some seats left</option>
        <option value="High">🔴 High — Very crowded</option>
      </select>
    </div>
 
    <button onclick="startTracking()">▶ Start GPS Tracking</button>
    <button id="btn-stop" onclick="stopTracking()" disabled>⏹ Stop Tracking</button>
 
    <div id="status-box">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-val" id="st-status">Not tracking</span>
      </div>
      <div class="status-row">
        <span class="status-label">Bus ID</span>
        <span class="status-val" id="st-bus">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Latitude</span>
        <span class="status-val" id="st-lat">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Longitude</span>
        <span class="status-val" id="st-lng">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Last Updated</span>
        <span class="status-val" id="st-time">—</span>
      </div>
    </div>
  </div>
 
  <!-- Load firebase config from the public folder -->
  <script src="../public/firebase-config.js"></script>
  <script src="driver.js"></script>
</body>
</html>

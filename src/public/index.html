<!DOCTYPE html>
<html>
<head>
  <title>Live Bus Tracking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Step 1: Location -->
  <div class="card" id="step1">
    <div class="step-tag">Step 1</div>
    <h2>📍 Allow Location</h2>
    <p>We need your GPS to find the nearest bus.</p>
    <button id="btn-location" onclick="getLocation()">Allow Location Access</button>
  </div>

  <!-- Step 2: Route -->
  <div class="card hidden" id="step2">
    <div class="step-tag">Step 2</div>
    <h2>🚌 Select Your Route</h2>
    <select id="route-select" onchange="onRouteSelected()">
      <option value="">-- Choose a Route --</option>
    </select>
  </div>

  <!-- Step 3: Destination -->
  <div class="card hidden" id="step3">
    <div class="step-tag">Step 3</div>
    <h2>🚏 Select Your Stop</h2>
    <select id="dest-select" onchange="onDestinationSelected()">
      <option value="">-- Select Your Stop --</option>
    </select>
  </div>

  <!-- Step 4: Live Tracking -->
  <div class="card hidden" id="step4">
    <div class="step-tag">Step 4 — Live ●</div>
    <h2>🗺️ Bus Tracker</h2>
    <div id="bus-info-container"></div>
    <div id="map"></div>
    <button onclick="resetApp()" style="margin-top:16px;background:#333">🔄 Track Another Bus</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>

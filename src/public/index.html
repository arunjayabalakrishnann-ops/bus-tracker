<!DOCTYPE html>
<html>
<head>
  <title>Live Bus Tracking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #121212; color: #fff; padding: 16px; }
    .card {
      background: #1e1e1e; border-radius: 12px;
      padding: 20px; margin-bottom: 16px;
    }
    .hidden { display: none; }
    .step-tag {
      font-size: 11px; color: #00BFA5;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    h2 { font-size: 20px; margin-bottom: 8px; }
    p  { color: #aaa; font-size: 14px; margin-bottom: 16px; }
    button {
      width: 100%; padding: 14px;
      background: #FF5722; color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: bold; cursor: pointer;
    }
    select {
      width: 100%; padding: 12px;
      background: #2a2a2a; color: #fff;
      border: 1px solid #333; border-radius: 10px;
      font-size: 15px;
    }
    #map { height: 350px; border-radius: 10px; margin-top: 12px; }
    .bus-id-row { font-size: 13px; color: #aaa; margin-bottom: 12px; }
    .bus-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 12px;
    }
    .bus-stat {
      background: #2a2a2a; border-radius: 10px;
      padding: 12px; text-align: center;
    }
    .val { display: block; font-size: 20px; font-weight: bold; color: #FF5722; }
    .lbl { display: block; font-size: 11px; color: #aaa; margin-top: 4px; }
    .crowd-Low    { color: #00BFA5 !important; }
    .crowd-Medium { color: #FFC107 !important; }
    .crowd-High   { color: #FF5722 !important; }
  </style>
</head>
<body>

  <!-- Step 1 -->
  <div class="card" id="step1">
    <div class="step-tag">Step 1</div>
    <h2>📍 Allow Location</h2>
    <p>We need your GPS to find the nearest bus.</p>
    <button id="btn-location" onclick="getLocation()">Allow Location Access</button>
  </div>

  <!-- Step 2 -->
  <div class="card hidden" id="step2">
    <div class="step-tag">Step 2</div>
    <h2>🚌 Select Your Route</h2>
    <select id="route-select" onchange="onRouteSelected()">
      <option value="">-- Choose a Route --</option>
      <option value="route1">Route 1</option>
      <option value="route2">Route 2</option>
    </select>
  </div>

  <!-- Step 3 -->
  <div class="card hidden" id="step3">
    <div class="step-tag">Step 3</div>
    <h2>🚏 Select Your Stop</h2>
    <select id="dest-select" onchange="onDestinationSelected()">
      <option value="">-- Select Your Stop --</option>
    </select>
  </div>

  <!-- Step 4 -->
  <div class="card hidden" id="step4">
    <div class="step-tag">Step 4 — Live ●</div>
    <h2>🗺️ Bus Tracker</h2>
    <div id="bus-info-container"></div>
    <div id="map"></div>
    <button onclick="resetApp()" style="margin-top:16px;background:#333">🔄 Track Another Bus</button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
